version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    environment:
      - MODULE_NAME=src.api.main
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --workers 2

  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - api
    command: streamlit run src/ui/app.py
